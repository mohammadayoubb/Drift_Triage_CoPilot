name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Compile project modules
        run: |
          uv run python -m compileall service agent async_queue approvals dashboard tests src

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379/0
          AGENT_CHECKPOINTER: memory
        run: uv run pytest tests -v
